<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Result Certificate | SchoolPilot Elite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- PDF Engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* Absolute Clean Print Reset */
    body {
      background-color: #f0f4f8;
      margin: 0;
      padding: 0;
      font-family: 'Manrope', sans-serif;
    }
    
    .print-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      perspective: 1000px;
    }

    .print-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(15, 95, 154, 0.1);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
    }

    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .toolbar-brand img {
      width: 45px;
      height: 45px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
    }

    .toolbar-brand h2 {
      margin: 0;
      font-size: 1.25rem;
      background: linear-gradient(130deg, #0f5a95, #2f88c4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    @media print {
      body { background: white !important; }
      .print-toolbar, .bg-orb, .no-print { display: none !important; }
      .print-container { 
        margin: 0 !important; 
        padding: 0 !important; 
        width: 210mm !important; 
        max-width: none !important;
      }
      @page {
        size: A4 portrait;
        margin: 0;
      }
      .certificate {
        box-shadow: none !important;
        border-width: 4px !important;
        margin: 0 !important;
        width: 100% !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body class="preview-page">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="print-container">
    <nav class="print-toolbar no-print">
      <div class="toolbar-brand">
        <img src="assets/logo.png" alt="SchoolPilot">
        <h2>SchoolPilot Elite Print-Service</h2>
      </div>
      <div style="display: flex; gap: 12px;">
        <a href="index.html" class="btn btn-ghost">Dashboard</a>
        <button id="downloadPdfBtn" class="btn btn-soft">Download PDF</button>
        <button id="printBtn" class="btn btn-primary" style="padding: 12px 30px;">Print (A4)</button>
      </div>
    </nav>

    <div id="previewContent">
      <!-- Reinvented Templates injected here -->
    </div>
    
    <div id="previewError" class="preview-error hidden" style="text-align:center; padding: 100px; background: white; border-radius: 20px;">
      <h3 style="color: #e11d48;">Oops! Something went wrong.</h3>
      <p id="errorMsg"></p>
      <a href="index.html" class="btn btn-soft">Back to Home</a>
    </div>
  </main>

  <!-- Load the engine -->
  <script src="result-templates.js"></script>
</body>
</html>
