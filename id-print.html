<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print ID Card | SchoolPilot Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --id-card-base-width: 320px;
      --id-card-base-height: 500px;
      --id-card-scale: 0.64;
      --id-card-width: calc(var(--id-card-base-width) * var(--id-card-scale));
      --id-card-height: calc(var(--id-card-base-height) * var(--id-card-scale));
    }

    body {
      background: #f0f4f8;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .print-controls {
      margin-bottom: 30px;
      display: flex;
      gap: 15px;
    }

    .id-print-layout {
      display: flex;
      gap: 24px;
      justify-content: center;
      padding: 20px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .id-card-shell {
      width: var(--id-card-width);
      height: var(--id-card-height);
      position: relative;
    }

    /* Aadhaar-style vertical footprint with scaled inner design */
    .id-card-front, .id-card-back {
      position: absolute;
      top: 0;
      left: 0;
      width: var(--id-card-base-width);
      height: var(--id-card-base-height);
      transform: scale(var(--id-card-scale));
      transform-origin: top left;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    @media print {
      body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body * { visibility: hidden; }
      .id-print-layout, .id-print-layout * { visibility: visible !important; }
      .print-controls { display: none !important; }
      .id-print-layout {
        display: flex !important;
        position: absolute;
        left: 0;
        top: 0;
        box-shadow: none;
        padding: 0;
        gap: 8mm;
        margin: 0 auto;
        width: 100%;
        justify-content: center;
      }
      .id-card-shell {
        width: var(--id-card-width) !important;
        height: var(--id-card-height) !important;
        position: relative !important;
        page-break-inside: avoid;
      }
      .id-card-front, .id-card-back {
        border: 1px solid #ddd;
        position: absolute !important;
      }
    }
  </style>
</head>
<body>
  <div class="print-controls">
    <button class="btn btn-ghost" onclick="window.close()">Close Preview</button>
    <button class="btn btn-primary" onclick="window.print()">Confirm & Print</button>
  </div>

  <div class="id-print-layout">
    <div class="id-card-shell">
      <div id="printFront" class="id-card-front"></div>
    </div>
    <div class="id-card-shell">
      <div id="printBack" class="id-card-back"></div>
    </div>
  </div>

  <script>
    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function render() {
      const data = JSON.parse(localStorage.getItem('temp_id_card_data') || '{}');
      
      const frontHTML = `
        <div class="id-header">
          <div class="id-hologram"></div>
          <img src="${data.schoolLogo}" alt="Logo" class="id-school-logo" />
          <div class="id-school-info">
             <h2>${escapeHTML(data.schoolName?.toUpperCase())}</h2>
             <p>${escapeHTML(data.schoolLocation)}</p>
          </div>
        </div>
        <div class="id-body">
          <img src="${data.schoolLogo}" class="id-watermark" alt="Watermark" />
          <div class="id-photo-container">
            <img src="${data.studentPhoto || 'https://api.dicebear.com/7.x/avataaars/svg?seed=student'}" alt="Student" class="id-student-photo" />
          </div>
          <div class="id-name-area">
            <h3 class="id-student-name">${escapeHTML(data.studentName)}</h3>
            <span class="id-student-tag">STUDENT IDENTITY CARD</span>
          </div>
          <div class="id-detail-grid">
             <div class="id-item"><small>Adm No.</small><strong>${escapeHTML(data.admissionNo)}</strong></div>
             <div class="id-item"><small>Roll No.</small><strong>${escapeHTML(data.rollNo)}</strong></div>
             <div class="id-item"><small>Class</small><strong>${escapeHTML(data.classSection)}</strong></div>
          </div>
        </div>
        <div class="id-footer"><div class="id-validity">VALID UP TO: ${escapeHTML(data.validity)}</div></div>
      `;

      const backHTML = `
        <div class="id-back-content">
          <img src="${data.schoolLogo}" class="id-watermark" alt="Watermark" />
          <div class="id-back-header"><h3>PERSONAL DETAILS</h3></div>
          <div class="id-back-list">
            <div class="id-back-item"><span class="label">Father's Name</span><span class="value">${escapeHTML(data.fatherName)}</span></div>
            <div class="id-back-item"><span class="label">Date of Birth</span><span class="value">${escapeHTML(data.dob)}</span></div>
            <div class="id-back-item"><span class="label">Blood Group</span><span class="value">${escapeHTML(data.bloodGroup)}</span></div>
            <div class="id-back-item"><span class="label">Contact No.</span><span class="value">${escapeHTML(data.phone)}</span></div>
            <div class="id-back-item"><span class="label">Address</span><span class="value address-value">${escapeHTML(data.address)}</span></div>
          </div>
          <div class="id-back-footer">
            <div class="id-signature-area"><div class="signature-line"></div><small>Principal Signature</small></div>
            <div class="id-contact-info"><p>If found, please return to office.</p><small>Contact: ${data.schoolMobile}</small></div>
          </div>
        </div>
      `;

      document.getElementById('printFront').innerHTML = frontHTML;
      document.getElementById('printBack').innerHTML = backHTML;
    }
    render();
  </script>
</body>
</html>
